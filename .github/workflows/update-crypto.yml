name: Update LibertyVIP Crypto Watchlist

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-crypto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh crypto watchlist
        run: python scripts/update_crypto_dashboard.py

      - name: Commit and push update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crypto/index.html crypto/latest.json
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Update LibertyVIP crypto watchlist"
            git push
          fi
